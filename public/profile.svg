<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520" role="img" aria-label="Profile avatar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3c58e3"/>
      <stop offset="0.55" stop-color="#5b78f6"/>
      <stop offset="1" stop-color="#5ab5e2"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="55%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="520" fill="url(#bg)"/>
  <rect width="400" height="520" fill="url(#glow)"/>
  <!-- subtle stars -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="60" cy="70" r="2"/>
    <circle cx="330" cy="110" r="2.5"/>
    <circle cx="300" cy="60" r="1.6"/>
    <circle cx="90" cy="150" r="1.6"/>
    <circle cx="350" cy="200" r="2"/>
    <circle cx="50" cy="240" r="2"/>
  </g>
  <!-- person silhouette -->
  <g fill="#ffffff" opacity="0.92">
    <circle cx="200" cy="220" r="78"/>
    <path d="M70 470c0-78 58-130 130-130s130 52 130 130v50H70z"/>
  </g>
  <!-- initials chip -->
  <g>
    <rect x="150" y="448" width="100" height="44" rx="22" fill="#07090f" opacity="0.55"/>
    <text x="200" y="479" text-anchor="middle" font-family="Sora, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">DC</text>
  </g>
</svg>
